<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gowtham Mess — Order Book</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --leaf: #2f5233;
    --leaf-dark: #1d3620;
    --cream: #fbf6ec;
    --clay: #c96f34;
    --clay-dark: #a2551f;
    --ink: #2a2620;
    --paid: #2f7d4f;
    --pending: #b5761c;
    --border: #e4dcc8;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--cream);
    font-family: 'Inter', sans-serif;
    color: var(--ink);
  }
  header{
    background: var(--leaf);
    color: var(--cream);
    padding: 22px 28px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  header h1{
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    margin:0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  header .tag{
    font-size: 0.8rem;
    opacity: 0.75;
    margin-top: 2px;
  }
  #refresh-btn{
    background: var(--clay);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    font-size: 0.9rem;
  }
  #refresh-btn:hover{ background: var(--clay-dark); }

  main{
    max-width: 1080px;
    margin: 28px auto;
    padding: 0 20px 60px;
  }

  .stats{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat-card{
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .stat-card .label{
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: #8a8270;
  }
  .stat-card .value{
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    color: var(--leaf-dark);
    margin-top: 4px;
  }

  .order-card{
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .order-head{
    display:flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    gap: 12px;
    flex-wrap: wrap;
  }
  .order-head:hover{ background: #faf7ef; }
  .order-id{
    font-family: 'Fraunces', serif;
    font-weight: 600;
    color: var(--leaf-dark);
  }
  .order-meta{
    font-size: 0.85rem;
    color: #6b6455;
  }
  .badge{
    padding: 4px 12px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge.paid{ background: rgba(47,125,79,0.12); color: var(--paid); }
  .badge.pending{ background: rgba(181,118,28,0.14); color: var(--pending); }
  .order-total{
    font-weight: 700;
    color: var(--clay-dark);
    font-size: 1.05rem;
  }
  .order-body{
    display:none;
    padding: 0 18px 18px;
    border-top: 1px solid var(--border);
  }
  .order-body.open{ display:block; }
  .order-body table{
    width:100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 0.9rem;
  }
  .order-body th, .order-body td{
    text-align:left;
    padding: 6px 4px;
    border-bottom: 1px dashed var(--border);
  }
  .order-body .detail-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 8px 20px;
    margin-top: 14px;
    font-size: 0.88rem;
  }
  .order-body .detail-grid b{ color: var(--leaf-dark); }

  #empty, #loading, #error{
    text-align:center;
    padding: 60px 20px;
    color: #8a8270;
  }
  #error{ color: #b3402c; }
</style>
</head>
<body>

<header>
  <div>
    <h1>🍴 Gowtham Mess — Order Book</h1>
    <div class="tag">Live orders from the website</div>
  </div>
  <button id="refresh-btn" onclick="loadOrders()">Refresh</button>
</header>

<main>

  <div class="stats" id="stats"></div>

  <div id="loading">Loading orders…</div>
  <div id="error" style="display:none;"></div>
  <div id="empty" style="display:none;">No orders yet.</div>
  <div id="order-list"></div>

</main>

<script>
async function loadOrders(){
  const list = document.getElementById("order-list");
  const loading = document.getElementById("loading");
  const errorBox = document.getElementById("error");
  const empty = document.getElementById("empty");
  const stats = document.getElementById("stats");

  loading.style.display = "block";
  errorBox.style.display = "none";
  empty.style.display = "none";
  list.innerHTML = "";
  stats.innerHTML = "";

  try{
    const res = await fetch("/api/admin/orders");
    if(!res.ok){
      throw new Error("Server returned " + res.status);
    }
    const orders = await res.json();

    loading.style.display = "none";

    if(orders.length === 0){
      empty.style.display = "block";
      return;
    }

    const today = new Date().toDateString();
    const todaysOrders = orders.filter(o => new Date(o.created_at).toDateString() === today);
    const todaysRevenue = todaysOrders.reduce((sum, o) => sum + Number(o.total), 0);
    const pendingCount = orders.filter(o => o.payment_status !== "Paid ✅").length;

    stats.innerHTML = `
      <div class="stat-card">
        <div class="label">Orders Today</div>
        <div class="value">${todaysOrders.length}</div>
      </div>
      <div class="stat-card">
        <div class="label">Revenue Today</div>
        <div class="value">₹${todaysRevenue}</div>
      </div>
      <div class="stat-card">
        <div class="label">Pending Payment</div>
        <div class="value">${pendingCount}</div>
      </div>
      <div class="stat-card">
        <div class="label">Total Orders</div>
        <div class="value">${orders.length}</div>
      </div>
    `;

    orders.forEach(order => {
      const isPaid = order.payment_status === "Paid ✅";
      const card = document.createElement("div");
      card.className = "order-card";

      const itemRows = order.items.map(it => `
        <tr>
          <td>${it.item_name}</td>
          <td>${it.qty}</td>
          <td>₹${it.price}</td>
        </tr>
      `).join("");

      card.innerHTML = `
        <div class="order-head" onclick="this.nextElementSibling.classList.toggle('open')">
          <div>
            <div class="order-id">${order.order_no}</div>
            <div class="order-meta">${order.customer_name} • ${new Date(order.created_at).toLocaleString("en-IN")}</div>
          </div>
          <span class="badge ${isPaid ? "paid" : "pending"}">${order.payment_status}</span>
          <div class="order-total">₹${order.total}</div>
        </div>
        <div class="order-body">
          <div class="detail-grid">
            <div><b>Phone:</b> ${order.phone}</div>
            <div><b>Email:</b> ${order.email || "—"}</div>
            <div><b>Delivery:</b> ${order.delivery_type}</div>
            <div><b>Address / Table:</b> ${order.address || "—"}</div>
            <div><b>Payment method:</b> ${order.payment_method}</div>
            <div><b>Razorpay payment ID:</b> ${order.razorpay_payment_id || "—"}</div>
          </div>
          <table>
            <thead><tr><th>Item</th><th>Qty</th><th>Price</th></tr></thead>
            <tbody>${itemRows}</tbody>
          </table>
        </div>
      `;

      list.appendChild(card);
    });

  } catch(err){
    loading.style.display = "none";
    errorBox.style.display = "block";
    errorBox.textContent = "Could not load orders: " + err.message;
  }
}

loadOrders();
</script>

</body>
</html>
